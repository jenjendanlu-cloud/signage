<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看板播放端</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:none}
  #slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
  #slide img{width:100%;height:100%;object-fit:contain;display:block}
  #slide video{width:100%;height:100%;object-fit:contain;display:block}
  #overlay{position:absolute;inset:0;background:#000;opacity:0;transition:opacity .6s ease;pointer-events:none;z-index:10}
  #overlay.fade{opacity:1}
  #status{position:absolute;top:12px;right:16px;background:rgba(0,0,0,.6);color:rgba(255,255,255,.5);font-size:11px;padding:4px 10px;border-radius:20px;font-family:monospace;z-index:20;transition:opacity 1s}
  #dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);transition:.3s}
  .dot.active{background:rgba(255,255,255,.9);transform:scale(1.4)}
  #progress{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.5);z-index:20;transition:width linear}
  #empty{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:rgba(255,255,255,.3);font-family:system-ui;z-index:5}
  #empty.show{display:flex}
  #empty .ei{font-size:48px}
  #empty .em{font-size:16px}
  #empty .es{font-size:12px;opacity:.6}
</style>
</head>
<body>
<div id="overlay"></div>
<div id="slide"></div>
<div id="progress" style="width:0%"></div>
<div id="status">連線中...</div>
<div id="dots"></div>
<div id="empty">
  <div class="ei">📺</div>
  <div class="em">等待播放內容</div>
  <div class="es" id="dlabel"></div>
</div>
<script>
const SURL = 'https://tfrvnmlbrxeaqhvftpoo.supabase.co';
const SKEY = 'sb_publishable_Z1WopTSFAFX3zSV3npYXww_0f8VK68D';
const { createClient } = supabase;
const sb = createClient(SURL, SKEY);

const SLIDE_DURATION = 8000;
const POLL_INTERVAL  = 5000;
const HEARTBEAT_MS   = 10000;

const params   = new URLSearchParams(window.location.search);
const deviceId = params.get('device') || 'device1';
document.getElementById('dlabel').textContent = deviceId;
document.title = `看板 - ${deviceId}`;

let playlist    = [];
let mediaMap    = {};
let latestIds   = [];
let currentIdx  = 0;
let slideTimer  = null;

// ─── INIT ────────────────────────────────────────────────────────
async function init() {
  setStatus('連線中...');
  await loadAll();
  startHeartbeat();
  setInterval(pollPlaylist, POLL_INTERVAL);
}

async function loadAll() {
  const [mRes, dRes] = await Promise.all([
    sb.from('media').select('*'),
    sb.from('devices').select('playlist').eq('id', deviceId).single()
  ]);
  mediaMap = {};
  (mRes.data || []).forEach(m => { mediaMap[m.id] = m; });
  latestIds = dRes.data?.playlist || [];
  rebuild();
}

async function pollPlaylist() {
  const { data } = await sb.from('devices').select('playlist').eq('id', deviceId).single();
  const ids = data?.playlist || [];
  const changed = JSON.stringify(ids) !== JSON.stringify(latestIds);
  if (changed) {
    latestIds = ids;
    // Also refresh media in case new ones were uploaded
    const { data: mdata } = await sb.from('media').select('*');
    mediaMap = {};
    (mdata || []).forEach(m => { mediaMap[m.id] = m; });
    rebuild();
  }
}

function rebuild() {
  playlist = latestIds.map(id => mediaMap[id] ? { id, ...mediaMap[id] } : null).filter(Boolean);
  if (!playlist.length) {
    showEmpty('等待播放內容', `裝置：${deviceId}`);
    clearTimers();
    setStatus('無播放清單');
    return;
  }
  hideEmpty();
  renderDots();
  if (currentIdx >= playlist.length) currentIdx = 0;
  showSlide(currentIdx, false);
}

// ─── SLIDE ───────────────────────────────────────────────────────
function showSlide(idx, animate = true) {
  clearTimers();
  currentIdx = idx;
  const item = playlist[idx];
  if (!item) return;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === idx));
  if (animate) fadeOut(() => renderItem(item));
  else renderItem(item);
}

function renderItem(item) {
  const slide = document.getElementById('slide');
  slide.innerHTML = '';
  if (item.type === 'video') {
    const v = document.createElement('video');
    v.src = item.url; v.autoplay = true; v.muted = true; v.playsInline = true;
    v.onended = nextSlide; v.onerror = () => setTimeout(nextSlide, 1000);
    v.addEventListener('loadedmetadata', () => startProgress(v.duration * 1000));
    slide.appendChild(v);
    setStatus(`▶ ${item.name}`);
  } else {
    const img = document.createElement('img');
    img.src = item.url;
    img.onerror = () => setTimeout(nextSlide, 1000);
    slide.appendChild(img);
    setStatus(`🖼 ${item.name}`);
    startProgress(SLIDE_DURATION);
    slideTimer = setTimeout(nextSlide, SLIDE_DURATION);
  }
}

function nextSlide() { showSlide((currentIdx + 1) % playlist.length, true); }

function fadeOut(cb) {
  const ov = document.getElementById('overlay');
  ov.classList.add('fade');
  setTimeout(() => { cb(); ov.classList.remove('fade'); }, 600);
}

function startProgress(duration) {
  const bar = document.getElementById('progress');
  bar.style.transition = 'none'; bar.style.width = '0%';
  if (!duration) return;
  requestAnimationFrame(() => {
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '100%';
  });
}

function renderDots() {
  const dots = document.getElementById('dots');
  if (playlist.length <= 1) { dots.innerHTML = ''; return; }
  dots.innerHTML = playlist.map((_,i) => `<div class="dot ${i===currentIdx?'active':''}"></div>`).join('');
}

// ─── HEARTBEAT ───────────────────────────────────────────────────
function startHeartbeat() {
  const beat = () => sb.from('devices').update({ last_seen: Date.now() }).eq('id', deviceId);
  beat();
  setInterval(beat, HEARTBEAT_MS);
}

// ─── HELPERS ─────────────────────────────────────────────────────
function clearTimers() { clearTimeout(slideTimer); }

function setStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 4000);
}

function showEmpty(msg, sub) {
  document.getElementById('empty').querySelector('.em').textContent = msg;
  document.getElementById('empty').querySelector('.es').textContent = sub || '';
  document.getElementById('empty').classList.add('show');
  document.getElementById('slide').innerHTML = '';
}

function hideEmpty() { document.getElementById('empty').classList.remove('show'); }

// Tap to fullscreen
document.body.addEventListener('click', () => {
  if (document.documentElement.requestFullscreen)
    document.documentElement.requestFullscreen().catch(() => {});
});

init();
</script>
</body>
</html>
