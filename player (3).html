<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看板播放端</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:none}
  #slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
  #slide img{width:100%;height:100%;object-fit:contain;display:block}
  #slide video{width:100%;height:100%;object-fit:contain;display:block}
  #overlay{position:absolute;inset:0;background:#000;opacity:0;transition:opacity .6s ease;pointer-events:none;z-index:10}
  #overlay.fade{opacity:1}
  #status{position:absolute;top:12px;right:16px;background:rgba(0,0,0,.6);color:rgba(255,255,255,.6);font-size:12px;padding:5px 12px;border-radius:20px;font-family:monospace;z-index:20;transition:opacity 1s}
  #dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);transition:.3s}
  .dot.active{background:rgba(255,255,255,.9);transform:scale(1.4)}
  #progress{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.6);z-index:20}
  #empty{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:rgba(255,255,255,.35);font-family:system-ui;z-index:5;text-align:center;padding:20px}
  #empty.show{display:flex}
  #empty .ei{font-size:52px}
  #empty .em{font-size:18px}
  #empty .es{font-size:13px;opacity:.7;margin-top:4px}
</style>
</head>
<body>
<div id="overlay"></div>
<div id="slide"></div>
<div id="progress" style="width:0%"></div>
<div id="status">連線中...</div>
<div id="dots"></div>
<div id="empty">
  <div class="ei">📺</div>
  <div class="em">等待播放內容</div>
  <div class="es" id="dlabel"></div>
</div>
<script>
var SURL     = 'https://tfrvnmlbrxeaqhvftpoo.supabase.co';
var SKEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmcnZubWxicnhlYXFodmZ0cG9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjQ2MTAsImV4cCI6MjA5MTI0MDYxMH0.149qaXpEUjp4AnAxe15vSp6J72xIkKY24W0_Snwk5fA';
var SLIDE_MS = 8000;
var POLL_MS  = 5000;
var HB_MS    = 10000;

var params   = new URLSearchParams(window.location.search);
var deviceId = params.get('device') || 'device1';
document.getElementById('dlabel').textContent = '裝置：' + deviceId;
document.title = '看板 - ' + deviceId;

var hdrs = {
  'apikey': SKEY,
  'Authorization': 'Bearer ' + SKEY,
  'Content-Type': 'application/json'
};

function sbGet(table, qs) {
  return fetch(SURL + '/rest/v1/' + table + (qs ? '?' + qs : ''), { headers: hdrs })
    .then(function(r){ return r.json(); });
}

function sbPatch(table, qs, body) {
  return fetch(SURL + '/rest/v1/' + table + (qs ? '?' + qs : ''), {
    method: 'PATCH', headers: hdrs, body: JSON.stringify(body)
  });
}

var mediaMap  = {};
var latestIds = [];
var playlist  = [];
var curIdx    = 0;
var slideTimer = null;

function init() {
  setStatus('連線中...');
  Promise.all([
    sbGet('media', 'select=*'),
    sbGet('devices', 'select=playlist&id=eq.' + deviceId)
  ]).then(function(res) {
    var mData = res[0]; var dData = res[1];
    mediaMap = {};
    mData.forEach(function(m){ mediaMap[m.id] = m; });
    latestIds = (dData[0] && dData[0].playlist) ? dData[0].playlist : [];
    rebuild();
    startHeartbeat();
    setInterval(poll, POLL_MS);
  }).catch(function(e) {
    setStatus('錯誤：' + e.message);
    showEmpty('連線失敗', '8秒後重試...');
    setTimeout(init, 8000);
  });
}

function poll() {
  sbGet('devices', 'select=playlist&id=eq.' + deviceId).then(function(dData) {
    var ids = (dData[0] && dData[0].playlist) ? dData[0].playlist : [];
    if (JSON.stringify(ids) !== JSON.stringify(latestIds)) {
      latestIds = ids;
      sbGet('media', 'select=*').then(function(mData) {
        mediaMap = {};
        mData.forEach(function(m){ mediaMap[m.id] = m; });
        rebuild();
      });
    }
  }).catch(function(){});
}

function rebuild() {
  playlist = latestIds.map(function(id){
    return mediaMap[id] ? Object.assign({id: id}, mediaMap[id]) : null;
  }).filter(Boolean);

  if (!playlist.length) {
    showEmpty('等待播放內容', '裝置：' + deviceId);
    clearTimeout(slideTimer);
    setStatus('無播放清單');
    return;
  }
  hideEmpty();
  renderDots();
  if (curIdx >= playlist.length) curIdx = 0;
  showSlide(curIdx, false);
}

function showSlide(idx, animate) {
  clearTimeout(slideTimer);
  curIdx = idx;
  var item = playlist[idx];
  if (!item) return;
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.classList.toggle('active', i === idx);
  });
  if (animate) {
    fadeOut(function(){ renderItem(item); });
  } else {
    renderItem(item);
  }
}

function renderItem(item) {
  var slide = document.getElementById('slide');
  slide.innerHTML = '';
  if (item.type === 'video') {
    var v = document.createElement('video');
    v.src = item.url; v.autoplay = true; v.muted = true; v.playsInline = true;
    v.onended = nextSlide;
    v.onerror = function(){ setTimeout(nextSlide, 1000); };
    v.addEventListener('loadedmetadata', function(){ startProgress(v.duration * 1000); });
    slide.appendChild(v);
    setStatus('▶ ' + item.name);
  } else {
    var img = document.createElement('img');
    img.src = item.url;
    img.onerror = function(){ setTimeout(nextSlide, 2000); };
    slide.appendChild(img);
    setStatus('🖼 ' + item.name);
    startProgress(SLIDE_MS);
    slideTimer = setTimeout(nextSlide, SLIDE_MS);
  }
}

function nextSlide() { showSlide((curIdx + 1) % playlist.length, true); }

function fadeOut(cb) {
  var ov = document.getElementById('overlay');
  ov.classList.add('fade');
  setTimeout(function(){ cb(); ov.classList.remove('fade'); }, 600);
}

function startProgress(dur) {
  var bar = document.getElementById('progress');
  bar.style.transition = 'none'; bar.style.width = '0%';
  if (!dur) return;
  requestAnimationFrame(function(){
    bar.style.transition = 'width ' + dur + 'ms linear';
    bar.style.width = '100%';
  });
}

function renderDots() {
  var dots = document.getElementById('dots');
  if (playlist.length <= 1) { dots.innerHTML = ''; return; }
  dots.innerHTML = playlist.map(function(_,i){
    return '<div class="dot' + (i===curIdx?' active':'') + '"></div>';
  }).join('');
}

function startHeartbeat() {
  function beat(){ sbPatch('devices', 'id=eq.' + deviceId, { last_seen: Date.now() }).catch(function(){}); }
  beat();
  setInterval(beat, HB_MS);
}

function setStatus(msg) {
  var el = document.getElementById('status');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.opacity = '0'; }, 4000);
}

function showEmpty(msg, sub) {
  document.getElementById('empty').querySelector('.em').textContent = msg;
  document.getElementById('empty').querySelector('.es').textContent = sub || '';
  document.getElementById('empty').classList.add('show');
  document.getElementById('slide').innerHTML = '';
}

function hideEmpty() { document.getElementById('empty').classList.remove('show'); }

document.body.addEventListener('click', function(){
  if (document.documentElement.requestFullscreen)
    document.documentElement.requestFullscreen().catch(function(){});
});

init();
</script>
</body>
</html>
